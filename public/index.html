<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>TSB Rankings · Roblox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    :root{
      --bg:#0c0c10;
      --surface:#141418;
      --surface2:#1c1c22;
      --border:rgba(255,255,255,0.07);
      --border2:rgba(255,255,255,0.13);
      --text:#f1f1f1;
      --muted:#888;
      --hint:#555;
      --gold:#f5c518;
      --gold-dim:#BA7517;
      --silver:#a0a0a0;
      --bronze:#cd7f32;
      --accent:#7c6af7;
      --accent-dim:#534AB7;
      --green:#22c55e;
    }

    body{
      font-family:'Inter',system-ui,sans-serif;
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
      padding-bottom:3rem;
    }

    /* ── HEADER ── */
    .header{
      text-align:center;
      padding:2.5rem 1rem 1.5rem;
      border-bottom:1px solid var(--border);
      position:relative;
      overflow:hidden;
    }
    .header::before{
      content:'';
      position:absolute;inset:0;
      background:radial-gradient(ellipse 60% 50% at 50% 0%,rgba(124,106,247,.12),transparent);
      pointer-events:none;
    }
    .header-badge{
      display:inline-flex;align-items:center;gap:6px;
      font-size:11px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;
      color:var(--accent);background:rgba(124,106,247,.12);
      padding:4px 12px;border-radius:20px;border:1px solid rgba(124,106,247,.25);
      margin-bottom:12px;
    }
    .live-dot{
      width:7px;height:7px;border-radius:50%;
      background:var(--green);
      animation:pulse 1.5s infinite;
    }
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
    h1{
      font-size:32px;font-weight:700;letter-spacing:3px;
      background:linear-gradient(135deg,#f5c518,#f0997b,#7c6af7);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      background-clip:text;
      margin-bottom:6px;
    }
    .header p{font-size:13px;color:var(--muted)}

    /* ── STATS BAR ── */
    .stats-bar{
      display:flex;justify-content:center;gap:0;
      border-bottom:1px solid var(--border);
    }
    .stat{
      flex:1;max-width:160px;text-align:center;
      padding:14px 8px;border-right:1px solid var(--border);
    }
    .stat:last-child{border-right:none}
    .stat-val{font-size:20px;font-weight:700;color:var(--text)}
    .stat-lbl{font-size:11px;color:var(--muted);margin-top:2px;letter-spacing:.5px}

    /* ── TABS ── */
    .tabs{
      display:flex;gap:8px;padding:1.25rem 1.5rem 0.75rem;flex-wrap:wrap;
    }
    .tab{
      display:inline-flex;align-items:center;gap:6px;
      font-size:12px;font-weight:500;padding:6px 16px;
      border-radius:20px;border:1px solid var(--border2);
      background:transparent;color:var(--muted);cursor:pointer;
      transition:all .18s;font-family:inherit;
    }
    .tab:hover{color:var(--text);border-color:rgba(255,255,255,.25)}
    .tab.active{background:var(--accent-dim);color:#fff;border-color:transparent}
    .tab i{font-size:14px}

    /* ── SECTION LABEL ── */
    .section-lbl{
      font-size:11px;color:var(--hint);letter-spacing:1.5px;text-transform:uppercase;
      padding:0 1.5rem .5rem;
    }

    /* ── PODIUM ── */
    .podium{
      display:flex;justify-content:center;align-items:flex-end;
      gap:16px;padding:0.5rem 1rem 0;
    }
    .p-card{display:flex;flex-direction:column;align-items:center;gap:8px}
    .p-av-wrap{position:relative}
    .p-av{
      border-radius:50%;overflow:hidden;
      display:flex;align-items:center;justify-content:center;
      background:var(--surface2);flex-shrink:0;
    }
    .p-av img{width:100%;height:100%;object-fit:cover;display:block;border-radius:50%}
    .p-av .fb{
      font-weight:600;color:#fff;
      display:none;width:100%;height:100%;
      align-items:center;justify-content:center;
    }
    .p-badge{
      position:absolute;bottom:-2px;right:-2px;
      width:22px;height:22px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-size:11px;font-weight:700;color:#fff;
      border:2px solid var(--bg);
    }
    .p-name{
      font-size:12px;font-weight:600;text-align:center;
      max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
    }
    .p-score{font-size:11px;color:var(--muted)}
    .p-base{
      border-radius:8px 8px 0 0;
      display:flex;align-items:center;justify-content:center;
      font-size:18px;font-weight:700;color:#fff;
    }
    .crown{font-size:20px;margin-bottom:2px;filter:drop-shadow(0 0 6px rgba(245,197,24,.6))}

    /* ── LIST ── */
    .list{
      display:flex;flex-direction:column;gap:8px;
      padding:0.75rem 1.5rem;
    }
    .row{
      display:flex;align-items:center;gap:14px;
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:14px;padding:12px 16px;
      transition:background .15s,border-color .15s;cursor:default;
    }
    .row:hover{background:var(--surface2);border-color:var(--border2)}
    .r-num{
      font-size:14px;font-weight:500;color:var(--hint);
      min-width:24px;text-align:center;flex-shrink:0;
    }
    .r-av-wrap{position:relative;flex-shrink:0}
    .r-av{
      width:44px;height:44px;border-radius:50%;overflow:hidden;
      background:var(--surface2);
      display:flex;align-items:center;justify-content:center;
    }
    .r-av img{width:100%;height:100%;object-fit:cover;display:block;border-radius:50%}
    .r-av .fb{
      font-weight:600;font-size:14px;color:#fff;
      display:none;width:100%;height:100%;
      align-items:center;justify-content:center;
    }
    .r-info{flex:1;min-width:0}
    .r-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .r-id{font-size:11px;color:var(--hint);margin-top:1px}
    .r-bar-wrap{height:3px;background:rgba(255,255,255,.06);border-radius:3px;margin-top:6px}
    .r-bar{height:3px;border-radius:3px;transition:width .5s ease}
    .r-right{text-align:right;flex-shrink:0}
    .r-score{font-size:13px;font-weight:700}
    .r-sub{font-size:11px;color:var(--hint);margin-top:3px}

    /* ── FOOTER ── */
    footer{
      text-align:center;color:var(--hint);font-size:11px;
      margin-top:2rem;padding:0 1rem;line-height:1.8;
    }
    footer a{color:var(--accent);text-decoration:none}
    footer a:hover{text-decoration:underline}
  </style>
</head>
<body>

<div class="header">
  <div class="header-badge">
    <span class="live-dot"></span>
    Live Rankings
  </div>
  <h1><i class="ti ti-sword"></i> TSB RANKINGS <i class="ti ti-sword" style="display:inline-block;transform:scaleX(-1)"></i></h1>
  <p>The Strongest Battlegrounds · Global Leaderboard</p>
</div>

<div class="stats-bar" id="statsBar"></div>

<div class="tabs">
  <button class="tab active" onclick="setTab(this,'wins')">
    <i class="ti ti-medal"></i> Wins
  </button>
  <button class="tab" onclick="setTab(this,'kd')">
    <i class="ti ti-crosshair"></i> K/D Ratio
  </button>
  <button class="tab" onclick="setTab(this,'kills')">
    <i class="ti ti-flame"></i> Total Kills
  </button>
</div>

<div class="section-lbl" style="margin-bottom:.25rem">Podio</div>
<div class="podium" id="podio"></div>

<div class="section-lbl" style="margin-top:1.25rem">Clasificación</div>
<div class="list" id="list"></div>

<footer>
  Avatars cargados desde la API pública de Roblox · IDs de muestra<br>
  Para usar IDs reales, edita el array <code>players</code> en el &lt;script&gt;<br>
  Perfil → <a href="https://www.roblox.com" target="_blank">roblox.com/users/<strong>ID</strong>/profile</a>
</footer>

<script>
/*
  ═══════════════════════════════════════════════
   PERSONALIZACIÓN — edita aquí tus jugadores
   userId: número en la URL del perfil de Roblox
  ═══════════════════════════════════════════════
*/
const players = [
  { name:"Defaultio",    userId:"261",       wins:5120, kills:41000, deaths:3800, color:"#7c6af7" },
  { name:"Shedletsky",   userId:"1",         wins:4730, kills:37500, deaths:4200, color:"#0F6E56" },
  { name:"builderman",   userId:"156",       wins:4310, kills:34200, deaths:5100, color:"#D85A30" },
  { name:"ROBLOX",       userId:"1",         wins:3980, kills:30100, deaths:5900, color:"#185FA5" },
  { name:"Merely",       userId:"51375983",  wins:3540, kills:27300, deaths:6400, color:"#854F0B" },
  { name:"Seranok",      userId:"3257",      wins:3100, kills:24000, deaths:7100, color:"#993556" },
  { name:"lilly_s",      userId:"23655",     wins:2760, kills:21500, deaths:7800, color:"#3B6D11" },
  { name:"DontClickMe",  userId:"261647",    wins:2420, kills:18900, deaths:8500, color:"#5F5E5A" },
  { name:"korblox",      userId:"4",         wins:2080, kills:16200, deaths:9200, color:"#D4537E" },
  { name:"Gamer3580",    userId:"55549",     wins:1750, kills:13800, deaths:9900, color:"#534AB7" },
];

const THUMB = id =>
  `https://www.roblox.com/headshot-thumbnail/image?userId=${id}&width=150&height=150&format=png`;

const podiumOrder  = [1, 0, 2];
const podiumH      = [70, 96, 54];
const podiumSz     = [54, 68, 46];
const podiumLbl    = ["2","1","3"];
const podiumColors = ["#a0a0a0","#f5c518","#cd7f32"];

let tab = "wins";

function score(p){ return tab==="wins"?p.wins:tab==="kd"?+(p.kills/p.deaths).toFixed(2):p.kills }
function fmt(p){
  return tab==="wins"  ? p.wins.toLocaleString()+" W"
       : tab==="kd"    ? (p.kills/p.deaths).toFixed(2)+" K/D"
       : p.kills.toLocaleString()+" Kills";
}
function sub(p){ return p.kills.toLocaleString()+" kills · "+(p.kills/p.deaths).toFixed(2)+" K/D" }
function ini(n){ return n.slice(0,2).toUpperCase() }

function makeAv(userId,name,color,size,ring){
  const ringStyle = ring ? `box-shadow:0 0 0 3px ${ring},0 0 0 5px var(--bg)` : "";
  return `<div class="p-av" style="width:${size}px;height:${size}px;background:${color};${ringStyle}">
    <img src="${THUMB(userId)}" alt="${name}"
         onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
    <span class="fb">${ini(name)}</span>
  </div>`;
}

function makeRowAv(userId,name,color){
  return `<div class="r-av" style="background:${color}">
    <img src="${THUMB(userId)}" alt="${name}"
         onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
    <span class="fb">${ini(name)}</span>
  </div>`;
}

function renderStats(sorted){
  const totalWins  = sorted.reduce((s,p)=>s+p.wins,0);
  const totalKills = sorted.reduce((s,p)=>s+p.kills,0);
  const topKD      = Math.max(...sorted.map(p=>p.kills/p.deaths)).toFixed(2);
  document.getElementById("statsBar").innerHTML = `
    <div class="stat"><div class="stat-val">${sorted.length}</div><div class="stat-lbl">Jugadores</div></div>
    <div class="stat"><div class="stat-val">${totalWins.toLocaleString()}</div><div class="stat-lbl">Total Wins</div></div>
    <div class="stat"><div class="stat-val">${totalKills.toLocaleString()}</div><div class="stat-lbl">Total Kills</div></div>
    <div class="stat"><div class="stat-val">${topKD}</div><div class="stat-lbl">Mejor K/D</div></div>
  `;
}

function setTab(btn,t){
  tab=t;
  document.querySelectorAll(".tab").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  render();
}

function render(){
  const sorted = [...players].sort((a,b)=>score(b)-score(a));
  const max = score(sorted[0]);

  renderStats(sorted);

  /* PODIUM */
  document.getElementById("podio").innerHTML = podiumOrder.map((ri,pi)=>{
    const p=sorted[ri];
    const sz=podiumSz[pi], h=podiumH[pi], isFirst=pi===1;
    const ring = isFirst ? podiumColors[pi] : null;
    return `<div class="p-card">
      ${isFirst ? '<div class="crown">👑</div>' : ''}
      <div class="p-av-wrap">
        ${makeAv(p.userId,p.name,p.color,sz,ring)}
        <div class="p-badge" style="background:${podiumColors[pi]}">${podiumLbl[pi]}</div>
      </div>
      <div class="p-name">${p.name}</div>
      <div class="p-score">${fmt(p)}</div>
      <div class="p-base" style="width:${sz+24}px;height:${h}px;background:${podiumColors[pi]}">${podiumLbl[pi]}</div>
    </div>`;
  }).join("");

  /* LIST */
  document.getElementById("list").innerHTML = sorted.slice(3).map((p,i)=>{
    const rank=i+4, s=score(p), pct=Math.round(s/max*100);
    return `<div class="row">
      <span class="r-num">${rank}</span>
      <div class="r-av-wrap">${makeRowAv(p.userId,p.name,p.color)}</div>
      <div class="r-info">
        <div class="r-name">${p.name}</div>
        <div class="r-id">ID: ${p.userId}</div>
        <div class="r-bar-wrap">
          <div class="r-bar" style="width:${pct}%;background:${p.color}"></div>
        </div>
      </div>
      <div class="r-right">
        <div class="r-score" style="color:${p.color}">${fmt(p)}</div>
        <div class="r-sub">${sub(p)}</div>
      </div>
    </div>`;
  }).join("");
}

render();
// Registrar visita automáticamente
fetch('/api/visita')
  .catch(err => console.error('Error registrando visita:', err));
</script>
</body>
</html>
